/* 確保左側面板有足夠空間顯示 4 欄 */

}
        .copyable-area { cursor: copy; transition: background-color 0.2s; }

<script>
const tttt = { "unv": "和合本", "rcuv": "和修版", "ncv": "新譯本", "kjv": "KJV", "asv": "ASV", "bbe": "BBE", "web": "WEB", "lcc": "呂振中譯本", "ofm": "思高譯本", "tcv2019": "現中譯2019", "wcb": "環球譯本", "recover": "恢復本","tcv95":"現中譯1995", "cbol":"原文直譯","csb":"中文標準譯本","cnet":"NET聖經中譯本", "fhlwh":"新約原文","cuwv":"文理和合本經文","erv":"ERV" };

function numberConvertToUppercase(num) {
    const u = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
    const n = parseInt(num);
    if (n <= 10) return u[n];
    if (n < 20) return "十" + (n % 10 === 0 ? "" : u[n % 10]);
    return n.toString();
}

// 2. 啟動查詢 (整合你的 startQuery)
function startQuery() {
    // 清空右側預覽
    document.getElementById("displayContent").innerHTML = '<div id="doccontext"></div>';
    
    // 獲取目前選中的多個譯本
    const selectedOptions = Array.from(document.getElementById('selectList').selectedOptions);
    const targetTabs = document.querySelectorAll('[id^="tab"][id$="_box"]');
    
    // 初始化：隱藏所有 Tab
    targetTabs.forEach(tab => tab.style.visibility = 'hidden');

    // 依序為每個選中的譯本發送請求 (最多6個)
    selectedOptions.forEach((option, index) => {
        if (index < 6) {
            loadBibleDoc(option.value, index + 1);
        }
    });
}

// 全域變數或在初始化時渲染 Turnstile
let tsWidgetId;
window.onload = function() {
    if (typeof turnstile !== 'undefined') {
        tsWidgetId = turnstile.render('#turnstile-container', {
            sitekey: '0x4AAAAAACgckTL_y_96U7Cj', // 👈 這裡換成你的 Site Key
            callback: function(token) { console.log("驗證成功"); },
        });
    }
};

async function loadBibleDoc(verCode, tabIndex) {
    const book = document.getElementById("bibleBookList").value;
    const inputVal = document.getElementById("popupInput").value || "1";
    let [chap, sec] = inputVal.includes(':') ? inputVal.split(':') : [inputVal, ""];
    const gb = document.getElementById('checkboxSimplifiedChinese').checked ? 1 : 0;
    
    // 取得 Turnstile Token
    const turnstileToken = turnstile.getResponse(tsWidgetId);
    if (!turnstileToken) {
        alert("請先完成安全驗證 (點擊網頁上的驗證框)");
        return;
    }

   
	    let originalUrl = "https://bible.fhl.net/json/qb.php?chineses=" + encodeURIComponent(book) + 
              "&chap=" + chap + 
              "&sec=" + sec + 
              "&version=" + verCode + 
              "&gb=" + gb;
    const myWorkerUrl = "https://bible.q8g9tnm8r7.workers.dev/?url=" + encodeURIComponent(originalUrl);


    try {
        const response = await fetch(myWorkerUrl, {
            method: "GET",
            headers: {
                "X-Turnstile-Token": turnstileToken // 👈 傳送 Token 給 Worker
            }
        });

        if (response.ok) {
            const data = await response.text();
            renderToTab(data, tabIndex, verCode);
            
            // 每次成功後重置驗證碼，防止 Token 被重複利用 (安全性最高)
            turnstile.reset(tsWidgetId); 
        } else if (response.status === 403 || response.status === 401) {
            alert("安全驗證失效，請重新驗證");
            turnstile.reset(tsWidgetId);
        } else {
            console.error("Worker 請求失敗，狀態碼: " + response.status);
        }
    } catch (err) {
        console.error("網路錯誤: " + err.message);
    }
}

	
function renderToTab(responseText, tabIndex, verCode) {
    let aaobj;
    try {
        // 清理 JSON 中的特殊字元並解析
        const cleanedJson = responseText.replace(/[\u3000\u000A\u000D]+/g, "");
        aaobj = JSON.parse(cleanedJson);
    } catch (e) {
        console.error("JSON 解析失敗:", e);
        return;
    }

    const tabBox = document.getElementById(`tab${tabIndex}_box`);
    if (!tabBox) return;

    // --- 0. 處理 API 失敗 (例如新譯本權限阻斷) ---
    if (aaobj.status && aaobj.status.indexOf("Fail") !== -1) {
        tabBox.style.visibility = "visible";
        tabBox.querySelector('.tab-title-box').textContent = (tttt[verCode] || verCode) + " (連線受阻)";
        tabBox.querySelector('.tab-content-area').innerText = "此譯本目前禁止自動 API 查詢。\n請確認網址是否正確，或嘗試手動貼上 JSON 資料。";
        return;
    }

    // --- 1. 標題解析 ---
    const book = document.getElementById("bibleBookList").value;
    const inputVal = document.getElementById("popupInput").value || "1";
    
    let chapNum = "1", secIn = "";
    if (inputVal.includes(':')) {
        [chapNum, secIn] = inputVal.split(':').map(s => s.trim());
    } else {
        chapNum = inputVal.trim();
        // 抓取最後一節的節號作為範圍結束
        const lastSec = aaobj.record[aaobj.record_count - 1].sec;
        secIn = (aaobj.record_count > 1) ? `1-${lastSec}` : "1";
    }

    const chapChinese = numberConvertToUppercase(chapNum);
    const verName = tttt[verCode] || verCode;
    const fullTitle = `${book}${chapChinese}${secIn} (${verName})`;

    // --- 2. 內容生成 (整合新譯本清理邏輯) ---
    let aa2234 = ""; // Tab 顯示內容 (純文字)
    let aa2233 = "<font style='font-family:DFKai-SB'>「"; // 右側預覽內容

    for (let i = 0; i < aaobj.record_count; i++) {
        let item = aaobj.record[i];
        let text = item.bible_text;

        // --- [新譯本專用清理] 移除 <h1> 到 <h6> 及其內容 (如：一段小標題) ---
        text = text.replace(/<h[1-6]>.*?<\/h[1-6]>/gi, "");
        // 移除 |）這種特殊標記
        text = text.replace(/\|\uff09/g, "");

        // 清理所有剩餘 HTML 標籤與括號標記
        let rawText = text.replace(/<[^>]*>/g, "")
                          .replace(/【[^>]*】/g, "")
                          .replace(/[\u3000\u000A\u000D]+/g, "").trim();

        // 格式化輸出：節號 + 兩個全型空白 + 經文內容 + 換行 (PPT 專用)
        aa2234 += item.sec + "　" + rawText + "\n"; 
        aa2233 += "<sup>" + item.sec + "</sup>" + rawText;
    }

    aa2233 += "」";

    // --- 3. 處理「上帝/神」與符號修正 ---
    const useShen = document.getElementById('checkboxGodName').checked;
    if (useShen) {
        aa2234 = aa2234.replace(/上帝/g, "神");
        aa2233 = aa2233.replace(/上帝/g, "神");
    }
    // 修正破折號長度
    aa2234 = aa2234.replace(/─/g, "——");
    aa2233 = aa2233.replace(/─/g, "——");

    // --- 4. 更新 UI 畫面 ---
    tabBox.style.visibility = "visible";
    tabBox.querySelector('.tab-title-box').textContent = fullTitle;
    // 使用 innerText 保持 PPT 換行與空白格式
    tabBox.querySelector('.tab-content-area').innerText = aa2234;

    // 更新右側詳細顯示區
    const docContext = document.getElementById("doccontext");
    if (docContext) {
        docContext.innerHTML += `<div style="margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px;">
            <span style="font-size:12pt; line-height:1.6;">${aa2233} <br><b><u>${fullTitle}</u></b></span>
        </div>`;
    }
}



// 點擊複製功能：支援標題與經文各自複製
document.addEventListener('click', (e) => {
    const el = e.target;
    
    // 檢查點擊的是「內容區域」或是「標題區域」
    const isContent = el.classList.contains('tab-content-area');
    const isTitle = el.classList.contains('tab-title-box');

    if (isContent || isTitle) {
        // 獲取被點擊元素的文字
        const textToCopy = el.innerText; 
        
        if (!textToCopy) return;

        navigator.clipboard.writeText(textToCopy).then(() => {
            // 視覺回饋：變色效果
            el.classList.add('copy-success');
            setTimeout(() => el.classList.remove('copy-success'), 500);
            
            console.log("已成功複製內容：" + textToCopy.substring(0, 10) + "...");
        }).catch(err => {
            console.error('無法複製', err);
        });
    }
});


// 監聽譯本清單的變動
document.getElementById('selectList').addEventListener('change', function() {

    const book = document.getElementById("bibleBookList").value;
    const inputVal = document.getElementById("popupInput").value;
    
    if (book && inputVal) {
        startQuery();
    }
});

// 監聽上帝/神、簡體/繁體切換
document.getElementById('checkboxGodName').addEventListener('change', startQuery);
document.getElementById('checkboxSimplifiedChinese').addEventListener('change', startQuery);


// 5. 彈窗觸發事件
document.getElementById('bibleBookList').addEventListener('click', function(e) {
    if (e.target.tagName === 'OPTION' && !e.target.disabled) {
        const popup = document.getElementById('itemPopup');
        popup.style.display = 'block';
        popup.style.left = e.pageX + 10 + 'px';
        popup.style.top = e.pageY + 10 + 'px';
        document.getElementById('popupTitle').textContent = e.target.text.trim();
        document.getElementById('popupInput').focus();
    }
});

document.getElementById('popupInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('itemPopup').style.display = 'none';
        startQuery();
    }
});

document.getElementById('closePopupBtn').onclick = () => document.getElementById('itemPopup').style.display = 'none';
document.getElementById('resetSelectionBtn').onclick = () => location.reload();
</script>

</body>
</html>
