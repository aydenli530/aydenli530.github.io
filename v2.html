<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖經 PPT 快速擷取器 - 旗艦自訂版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <header class="header-zone">
        <div class="search-wrapper">
            <div class="search-row">
                <input type="text" id="bibleSearch" class="search-bar" placeholder="[Alt+S] 搜尋，如：1Pet 1:1" autocomplete="off">
                <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:24px;">🌓</button>
                <div id="hintWindow" class="hint-window"></div>
                <div id="suggestions" class="suggestions-box"></div>
            </div>
            <div id="historyTags" class="history-tags"></div>
        </div>
    </header>

    <nav class="mode-tabs">
        <button id="tab-copy" class="m-tab active" onclick="switchMode('copy')">⚡ 快速複製</button>
        <button id="tab-preview" class="m-tab" onclick="switchMode('preview')">👁️ 經文預覽</button>
        <button id="tab-spec" class="m-tab" onclick="switchMode('spec')">📋 開發規格</button>
    </nav>

    <main class="main-container">
        <!-- 快速複製介面 -->
        <div id="copyView">
            <div class="ver-filter-box" id="verFilter">
                <span class="filter-label">選擇展示譯本：</span>
                <!-- 由 JS 動態生成 Checkbox -->
            </div>
            <div id="copyGrid" class="copy-grid"></div>
        </div>

        <!-- 預覽介面 -->
        <div id="previewView" class="preview-pane">
            <div style="display:flex; justify-content: space-between; margin-bottom:20px; align-items:center;">
                <select id="previewVerSelect" onchange="updatePreview()" style="padding:8px; border-radius:6px; border:1px solid var(--border);"></select>
                <span id="previewTitle" style="font-weight:bold; font-size:18px; color:var(--accent);"></span>
            </div>
            <div id="previewContent"></div>
        </div>

        <!-- 開發規格分頁 -->
        <div id="specView" class="spec-pane">
            <h3 style="margin-top:0; color:var(--accent);">🤖 給 AI 的 Prompt 指令 (含篩選功能與 CSS)</h3>
            <div id="promptContent" class="spec-box"></div>
            <button onclick="copyToClipboard('promptContent')" style="padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">複製 AI 指令</button>
            
            <h3 style="margin-top:25px; color:var(--accent);">📋 功能檢查表 (功能總合)</h3>
            <div id="checklistContent" class="spec-box"></div>
            <button onclick="copyToClipboard('checklistContent')" style="padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">複製功能清單</button>
        </div>
    </main>

    <div id="toast"></div>
    <script src="bible-data.js"></script>
 <script>
/* --- 狀態與對照表 --- */
let state = { 
    bIdx: 0, chap: 1, vStart: 1, vEnd: 1, 
    history: [], 
    selectedVers: ["unv", "ncv", "kjv"] 
};

const tttt = { 
    "unv": "和合本", "rcuv": "和合修訂版", "ncv": "新譯本", 
    "kjv": "KJV", "niv": "NIV", "cnv": "當代譯本",
    "asv": "ASV", "nasb": "NASB"
};

/* --- 初始化 --- */
window.onload = () => {
    if (typeof BIBLE_DATA === 'undefined') return;
    renderFilter(); 
    renderHintWindow();
    renderCopyGrid(); 
    renderDevSpecs(); 
    setupSearch();
    
    const prevSelect = document.getElementById('previewVerSelect');
    if (prevSelect) {
        prevSelect.innerHTML = BIBLE_DATA.versions.map(v => `<option value="${v.id}">${v.n}</option>`).join('');
    }
    
    window.addEventListener('keydown', (e) => {
        if (e.altKey && e.key.toLowerCase() === 's') { 
            e.preventDefault(); 
            const i = document.getElementById('bibleSearch'); i.focus(); i.select(); 
        }
        if (e.altKey && e.key.toLowerCase() === 'd') { e.preventDefault(); toggleTheme(); }
    });
};

/* --- 核心渲染功能 --- */
function renderFilter() {
    const box = document.getElementById('verFilter');
    if (!box) return;
    box.innerHTML = `<span class="filter-label">選擇展示譯本：</span>` + BIBLE_DATA.versions.map(v => `
        <label class="check-item">
            <input type="checkbox" value="${v.id}" ${state.selectedVers.includes(v.id)?'checked':''} onchange="updateSelectedVers()"> ${v.n}
        </label>
    `).join('');
}

function updateSelectedVers() {
    state.selectedVers = Array.from(document.querySelectorAll('#verFilter input:checked')).map(i => i.value);
    renderCopyGrid();
}

function renderCopyGrid() {
    const grid = document.getElementById('copyGrid');
    if (!grid) return;
    const activeVers = BIBLE_DATA.versions.filter(v => state.selectedVers.includes(v.id));
    
    grid.innerHTML = activeVers.map(v => `
        <div class="ver-card" id="card-${v.id}">
            <div class="ver-info">
                <span class="ver-name">${v.n}</span>
                <span class="status-dot"></span>
            </div>
            <div class="card-btns">
                <button class="quick-copy-btn" onclick="copyAction('${v.id}', 'full')">⚡ 複製經文</button>
                <button class="copy-title-btn" onclick="copyAction('${v.id}', 'title')">📋 僅標題</button>
            </div>
            <div class="error-msg">⚠️ 抓取失敗</div>
        </div>`).join('');
}

async function fetchBibleData(verId, bookName, chap, vStart, vEnd) {
    const card = document.getElementById(`card-${verId}`);
    if (card) resetCardStatus(verId); // 每次檢查前先拿掉紅框

    return new Promise((resolve, reject) => {
        let secParam = (vStart === 0) ? "" : ((vStart === vEnd) ? `&sec=${vStart}` : `&sec=${vStart}-${vEnd}`);
        const url = `https://bible.fhl.net/json/qb.php?chineses=${encodeURIComponent(bookName)}&chap=${chap}&sec=${secParam}&version=${verId}&gb=0&strong=0`;
        
        const xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.timeout = 5000;
        xhr.onload = function() {
            if (this.status === 200) {
                const rawText = this.responseText.trim();
                
                // 攔截 SQL 錯誤訊息
                if (rawText.startsWith("Fail:") ) {
                    if (card) markCardError(verId); // 立即標紅
                    reject("譯本資料庫 SQL 異常");
                    return;
                }

                try {
                    let res = JSON.parse(rawText.replace(/[\u3000\u000A\u000D]+/g, " "));
                    if (!res.record || res.record.length === 0) {
                        if (card) markCardError(verId);
                        reject("查無資料");
                    } else {
                        resolve(processFhlData(res));
                    }
                } catch(e) { 
                    if (card) markCardError(verId);
                    reject("JSON 格式錯誤"); 
                }
            } else { 
                if (card) markCardError(verId);
                reject(`HTTP ${this.status}`); 
            }
        };
        xhr.onerror = () => { if (card) markCardError(verId); reject("網路失敗"); };
        xhr.send();
    });
}





function processFhlData(data) {
    return data.record.map(r => {
        let text = r.bible_text.replace(/<h[1-6]>.*?<\/h[1-6]>/g, "").replace(/<[^>]*>/g, "").replace(/【[^>]*】/g, "");
        return { sec: r.sec, text: text.trim() };
    });
}

/* --- 狀態標示功能 --- */
function markCardError(verId) {
    const card = document.getElementById(`card-${verId}`);
    if (card) card.classList.add('has-error');
}

function resetCardStatus(verId) {
    const card = document.getElementById(`card-${verId}`);
    if (card) card.classList.remove('has-error');
}

/* --- 搜尋與解析 --- */
function setupSearch() {
    const input = document.getElementById('bibleSearch');
    const sugBox = document.getElementById('suggestions');

    input.addEventListener('input', () => {
        const val = input.value.trim().toLowerCase();
        if (val.length > 0) {
            const matches = BIBLE_DATA.books.filter(b => b.n.includes(val) || b.s.toLowerCase().startsWith(val)).slice(0, 5);
            sugBox.innerHTML = matches.map(b => `<div class="sug-item" onclick="quickFill('${b.s}')">📖 ${b.n} (${b.s})</div>`).join('');
            sugBox.style.display = 'block';
        } else { sugBox.style.display = 'none'; }
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            sugBox.style.display = 'none';
            parseSearch(input.value);
        }
    });
}

function parseSearch(raw) {
    const regex = /^([1-3]?[\u4e00-\u9fa5a-zA-Z]+)?\s*(\d+)(?:[:\s](\d+)(?:-(\d+))?)?$/i;
    const match = raw.match(regex);

    if (match) {
        const bookPart = match[1] ? match[1].replace(/\s/g,'').toLowerCase() : "";
        const idx = BIBLE_DATA.books.findIndex(b => b.n.includes(bookPart) || b.s.toLowerCase() === bookPart || b.k.toLowerCase() === bookPart);
        
        if (idx !== -1) {
            state.bIdx = idx;
            state.chap = parseInt(match[2]);
            state.vStart = match[3] ? parseInt(match[3]) : 0;
            state.vEnd = match[4] ? parseInt(match[4]) : state.vStart;
            
            const book = BIBLE_DATA.books[idx];
            showToast(`定位：${book.n} ${state.chap}`);

            // 1. 重新渲染 Grid（重置所有卡片狀態為初始綠點）
            renderCopyGrid(); 
            
            // 2. 核心功能：搜尋後立即檢查所有譯本是否有效
            checkAllSelectedVersons();

            // 3. 同步更新預覽 (如果當前在預覽頁面)
            if (document.getElementById('previewView').style.display !== 'none') updatePreview();
        }
    }
}


/**
 * 搜尋後自動觸發：檢查所有勾選譯本的 API 可用性
 */
async function checkAllSelectedVersons() {
    const book = BIBLE_DATA.books[state.bIdx];
    
    // 對每個已勾選的譯本併行發送請求
    state.selectedVers.forEach(async (verId) => {
        try {
            // 呼叫現有的 fetchBibleData
            // 該函數內部已包含 SQL Fail 偵測與 markCardError(verId) 邏輯
            await fetchBibleData(verId, book.s, state.chap, state.vStart, state.vEnd);
        } catch (err) {
            // 如果失敗，fetchBibleData 內部會自動執行 markCardError(verId)
            console.warn(`[AutoCheck] ${verId} 預檢失敗: ${err}`);
        }
    });
}


async function updatePreview() {
    const previewSelect = document.getElementById('previewVerSelect');
    const prevContent = document.getElementById('previewContent');
    const prevTitle = document.getElementById('previewTitle');
    
    if (!previewSelect || !prevContent || !BIBLE_DATA) return;

    const verId = previewSelect.value;
    const book = BIBLE_DATA.books[state.bIdx];
    
    // 建立顯示標題 (例如：創世記 1:1-5)
    const rangeStr = state.vStart === 0 ? "" : `:${state.vStart}${state.vEnd > state.vStart ? '-' + state.vEnd : ''}`;
    const fullRef = `${book.n} ${state.chap}${rangeStr}`;
    
    if (prevTitle) prevTitle.innerText = fullRef;
    
    // 顯示讀取中狀態
    prevContent.innerHTML = `
        <div style="padding:40px; text-align:center; color:var(--accent);">
            <div class="loading-spinner">⏳</div>
            <div style="margin-top:10px; font-size:16px;">正在從 FHL 擷取經文...</div>
        </div>
    `;

    try {
        // 呼叫 API (fetchBibleData 內部已處理 SQL 錯誤攔截)
        const verses = await fetchBibleData(verId, book.s, state.chap, state.vStart, state.vEnd);
        
        if (verses && verses.length > 0) {
            // 渲染經文列表
            let html = verses.map(v => `
                <div class="verse-line">
                    <span style="color:var(--accent); font-weight:bold; margin-right:15px; font-size:0.8em; min-width:30px; display:inline-block;">
                        ${v.sec}
                    </span>
                    <span class="verse-text">${v.text}</span>
                </div>
            `).join('');
            prevContent.innerHTML = html;
        } else {
            throw new Error("此章節無回傳資料");
        }

    } catch (err) {
        // 當抓取失敗 (包含 SQL Fail 訊息) 時的 UI 顯示
        prevContent.innerHTML = `
            <div style="padding:40px; text-align:center; border:2px dashed var(--border); border-radius:12px; margin:20px;">
                <div style="font-size:40px; margin-bottom:15px;">⚠️</div>
                <div style="color:var(--error); font-weight:bold; font-size:18px; margin-bottom:10px;">預覽失敗</div>
                <div style="color:var(--text); font-size:14px; opacity:0.8;">原因：${err}</div>
                <button onclick="updatePreview()" style="margin-top:20px; padding:8px 20px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer;">重試</button>
            </div>
        `;
        console.error(`[Preview Error] ${verId}:`, err);
    }
}

/* --- 複製與切換功能 --- */
async function copyAction(verId, type) {
    const book = BIBLE_DATA.books[state.bIdx];
    try {
        const verses = await fetchBibleData(verId, book.s, state.chap, state.vStart, state.vEnd);
        const ref = `${book.n} ${state.chap}${state.vStart === 0 ? '' : ':' + state.vStart + (state.vEnd > state.vStart ? '-' + state.vEnd : '')}`;
        if (type === 'title') {
            await navigator.clipboard.writeText(`${ref} (${tttt[verId] || verId})`);
        } else {
            let content = verses.map(v => (verses.length > 1 ? `${v.sec} ` : "") + v.text).join(" ");
            await navigator.clipboard.writeText(content);
        }
        showToast("複製成功");
    } catch (err) { showToast("抓取失敗：" + err); }
}

function switchMode(m) {
    document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + m).classList.add('active');
    ['copyView', 'previewView', 'specView'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById(m + 'View').style.display = 'block';
    if (m === 'preview') updatePreview();
}

/* --- 輔助介面 --- */
function toggleTheme() {
    document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block'; t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display = 'none', 300); }, 2000);
}

function quickFill(s) {
    document.getElementById('bibleSearch').value = s + " ";
    document.getElementById('bibleSearch').focus();
    document.getElementById('suggestions').style.display = 'none';
}

function renderHintWindow() {
    const groups = [...new Set(BIBLE_DATA.books.map(b => b.g))];
    document.getElementById('hintWindow').innerHTML = groups.map(g => `
        <div class="hint-group"><div class="hint-title">${g}</div>
        <div class="hint-items">${BIBLE_DATA.books.filter(b => b.g === g).map(b => `<span class="hint-item" onclick="quickFill('${b.s}')">${b.s}</span>`).join('')}</div></div>`).join('');
}

function renderDevSpecs() {
    document.getElementById('promptContent').innerText = "FHL API 集成範例...";
    document.getElementById('checklistContent').innerText = "1. 異常監控 [OK]\n2. 跨節抓取 [OK]\n3. 自動清除標籤 [OK]";
}



        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    </script>
</body>
</html>
